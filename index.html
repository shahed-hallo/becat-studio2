<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="icon.png">
    <title>BeCat.Tech | Shahed</title>
    <style>
        :root {
            --mocha: #8d6e63;
            --cocoa: #5d4037;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(255, 255, 255, 0.3);
        }

        /* --- STRUCTURE --- */
        html, body {
            height: 100%;
            margin: 0;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.1)), 
                        url('cat-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            color: var(--cocoa);
        }

        /* --- HEADER (Fluid Logic) --- */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5vh 5%;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            flex-grow: 1; /* Center vertically on landing */
            z-index: 1000;
        }

        /* Transition to Top Bar */
        body.searching header {
            flex-grow: 0;
            position: fixed;
            top: 0; width: 100%;
            flex-direction: row;
            justify-content: space-around;
            padding: 15px 2%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: clamp(2.5rem, 12vw, 5.5rem);
            font-weight: 800;
            margin-bottom: 2vh;
            cursor: pointer;
            white-space: nowrap;
        }
        .logo span { color: var(--mocha); }

        body.searching .logo {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            margin-bottom: 0;
        }

        /* --- SEARCH BOX --- */
        .search-container {
            width: 100%;
            max-width: 650px;
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 110px 16px 25px;
            border-radius: 50px;
            border: 1px solid var(--border);
            outline: none;
            font-size: 16px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .search-btn {
            position: absolute;
            right: 8px;
            background: var(--mocha);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        /* --- RESULTS (Responsive Grid) --- */
        main {
            flex-grow: 1;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 5%;
            display: none;
        }

        body.searching main {
            display: block;
            padding-top: 120px; /* Space for fixed header */
            padding-bottom: 50px;
        }

        .result-item {
            background: var(--glass);
            margin-bottom: 20px;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .result-item:hover { transform: scale(1.01); }

        .result-item a {
            font-size: 1.4rem;
            color: #1a0dab;
            text-decoration: none;
            font-weight: 700;
        }

        /* --- MODAL (Responsive Frame) --- */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 2000;
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }

        #modal-content {
            width: clamp(300px, 90%, 1200px);
            height: 85%;
            background: white;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
        }

        #modal-iframe { width: 100%; height: 100%; border: none; }

        #close-btn {
            position: absolute; top: 15px; right: 20px;
            width: 45px; height: 45px; background: #eee;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            cursor: pointer; font-size: 28px; font-weight: bold;
        }

        /* --- FOOTER --- */
        footer {
            padding: 30px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
            margin-top: auto;
        }

        footer a { color: var(--cocoa); text-decoration: none; margin: 0 15px; font-weight: 600; }

        /* --- MEDIA QUERIES (Small Devices) --- */
        @media (max-width: 600px) {
            body.searching .logo { display: none; } /* Hide logo to make room for search input */
            body.searching header { justify-content: center; }
            input[type="text"] { padding: 14px 90px 14px 20px; font-size: 14px; }
            .search-btn { padding: 8px 18px; font-size: 13px; }
            #modal-content { width: 100%; height: 100%; border-radius: 0; }
        }
    </style>
</head>
<body>

    <div style="position: fixed; top: 15px; left: 15px; font-weight: 900; z-index: 999; cursor: pointer; color: var(--cocoa);" onclick="location.reload()">
        🐱 BeCat.Tech
    </div>

    <header id="topHeader">
        <div class="logo" onclick="location.reload()">BeCat<span>.Tech</span></div>
        <div class="search-container">
            <input type="text" id="searchInp" placeholder="Explore with BeCat..." autocomplete="off">
            <button class="search-btn" onclick="startSearch()">Search</button>
        </div>
    </header>

    <main id="resultsMain">
        <div id="list"></div>
    </main>

    <div id="modal-overlay" onclick="closeModal()">
        <div id="modal-content" onclick="event.stopPropagation()">
            <div id="close-btn" onclick="closeModal()">&times;</div>
            <iframe id="modal-iframe"></iframe>
        </div>
    </div>

    <footer>
        <a href="https://shahed.gt.tc/">Shahed</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Contact</a>
    </footer>

    <script>
        async function startSearch() {
            const val = document.getElementById('searchInp').value;
            const resMain = document.getElementById('resultsMain');
            const listDiv = document.getElementById('list');

            if (!val) return;

            document.body.classList.add('searching');
            resMain.style.display = "block";
            listDiv.innerHTML = "<p style='text-align:center;'>BeCat is searching the library...</p>";

            const url = `https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(val)}&limit=15&format=json&origin=*`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                listDiv.innerHTML = "";

                if (data[1].length === 0) {
                    listDiv.innerHTML = "<p style='text-align:center;'>No Wikipedia results found.</p>";
                    return;
                }

                data[1].forEach((title, i) => {
                    const box = document.createElement('div');
                    box.className = 'result-item';
                    box.innerHTML = `
                        <cite style="font-size:12px; color:var(--mocha); display:block; margin-bottom:5px;">${data[3][i]}</cite>
                        <a href="javascript:void(0)" onclick="openModal('${data[3][i]}')">${title}</a>
                        <p style="font-size:15px; line-height:1.6; margin-top:8px;">${data[2][i] || 'No summary available.'}</p>
                    `;
                    listDiv.appendChild(box);
                });
                
                window.scrollTo({top: 0, behavior: 'smooth'});
            } catch (e) {
                listDiv.innerHTML = "<p>Network error. Try again.</p>";
            }
        }

        function openModal(link) {
            document.getElementById('modal-iframe').src = link;
            document.getElementById('modal-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('modal-iframe').src = '';
            document.body.style.overflow = 'auto';
        }

        document.getElementById('searchInp').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startSearch();
        });
    </script>
</body>
</html>
