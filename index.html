<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="icon.png">
    <title>BeCat.Tech | Shahed</title>
    <style>
        :root {
            --mocha: #8d6e63;
            --cocoa: #5d4037;
            --glass-white: rgba(255, 255, 255, 0.8);
            --modal-bg: rgba(255, 255, 255, 0.9);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- STICKY FOOTER & LAYOUT --- */
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: linear-gradient(rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.1)), 
                        url('cat-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            color: var(--cocoa);
        }

        /* --- HEADER & SEARCH AREA --- */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: var(--transition);
            flex-grow: 1; /* Center vertically on start */
            z-index: 1000;
        }

        /* State when searching: Header becomes a fixed bar at the top */
        body.searching header {
            flex-grow: 0;
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            flex-direction: row;
            justify-content: center;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0 5%;
        }

        .logo {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            margin-bottom: 20px;
            cursor: pointer;
            transition: var(--transition);
        }
        .logo span { color: var(--mocha); }

        body.searching .logo {
            font-size: 1.5rem;
            margin-bottom: 0;
            margin-right: 20px;
        }

        .search-container {
            width: 100%;
            max-width: 580px;
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 110px 14px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            outline: none;
            font-size: 16px;
            background: var(--glass-white);
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: var(--transition);
        }

        input[type="text"]:focus {
            background: white;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.15);
        }

        .search-btn {
            position: absolute;
            right: 8px;
            background: var(--mocha);
            color: white;
            border: none;
            padding: 9px 22px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .search-btn:hover { background: var(--cocoa); }

        /* --- RESULTS SECTION --- */
        main {
            flex-grow: 1;
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            padding: 40px 20px;
            display: none; /* Hidden until search */
        }

        /* Adjust padding when header is fixed */
        body.searching main {
            display: block;
            padding-top: 110px; 
        }

        .result-item {
            background: var(--glass-white);
            margin-bottom: 18px;
            padding: 22px;
            border-radius: 18px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.2s;
        }

        .result-item:hover { transform: translateY(-3px); }

        .result-item a {
            font-size: 1.25rem;
            color: #1a0dab;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 6px;
        }

        /* --- MODAL (The Glass Frame) --- */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2000;
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
        }

        #modal-content {
            width: 88%; height: 82%;
            background: var(--modal-bg);
            border-radius: 28px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.4);
        }

        #modal-iframe { width: 100%; height: 100%; border: none; }

        #close-btn {
            position: absolute; top: 15px; right: 20px;
            width: 40px; height: 40px; background: white;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            cursor: pointer; font-size: 24px; z-index: 2100;
            color: var(--cocoa);
        }

        /* --- FOOTER --- */
        footer {
            flex-shrink: 0;
            padding: 25px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        footer a { color: var(--cocoa); text-decoration: none; margin: 0 15px; font-size: 14px; font-weight: 500; }

        /* --- MOBILE --- */
        @media (max-width: 650px) {
            body.searching header { height: 70px; justify-content: flex-start; padding: 0 15px; }
            body.searching .logo { display: none; }
            body.searching main { padding-top: 90px; }
            #modal-content { width: 95%; height: 90%; }
        }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="logo" onclick="location.reload()">BeCat<span>.Tech</span></div>
        <div class="search-container">
            <input type="text" id="userInput" placeholder="Search Wikipedia..." autocomplete="off">
            <button class="search-btn" onclick="performSearch()">Search</button>
        </div>
    </header>

    <main id="resultsArea">
        <div id="resultsList"></div>
    </main>

    <div id="modal-overlay" onclick="closeModal()">
        <div id="modal-content" onclick="event.stopPropagation()">
            <div id="close-btn" onclick="closeModal()">&times;</div>
            <iframe id="modal-iframe"></iframe>
        </div>
    </div>

    <footer>
        <a href="https://shahed.gt.tc/">Shahed</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Products</a>
    </footer>

    <script>
        async function performSearch() {
            const query = document.getElementById('userInput').value;
            const resultsArea = document.getElementById('resultsArea');
            const list = document.getElementById('resultsList');

            if (!query) return;

            document.body.classList.add('searching');
            resultsArea.style.display = "block";
            list.innerHTML = "<p style='text-align:center; margin-top:20px;'>Fetching knowledge...</p>";

            const url = `https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(query)}&limit=12&format=json&origin=*`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                list.innerHTML = "";

                if (data[1].length === 0) {
                    list.innerHTML = "<p style='text-align:center;'>No Wikipedia results found.</p>";
                    return;
                }

                data[1].forEach((title, i) => {
                    const item = document.createElement('div');
                    item.className = 'result-item';
                    item.innerHTML = `
                        <cite style="font-size:11px; color:var(--mocha); display:block; margin-bottom:4px;">${data[3][i]}</cite>
                        <a href="javascript:void(0)" onclick="openModal('${data[3][i]}')">${title}</a>
                        <p style="font-size:14px; line-height:1.5;">${data[2][i] || 'Click to view the full Wikipedia entry.'}</p>
                    `;
                    list.appendChild(item);
                });
                
                window.scrollTo({top: 0, behavior: 'smooth'});

            } catch (err) {
                list.innerHTML = "<p style='text-align:center;'>Error connecting to Wikipedia. Try again!</p>";
            }
        }

        function openModal(link) {
            const frame = document.getElementById('modal-iframe');
            frame.src = link;
            document.getElementById('modal-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('modal-iframe').src = '';
            document.body.style.overflow = 'auto';
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
