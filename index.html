<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="icon.png">
    <link rel="icon" href="/icon.png" type="image/png">
    <title>BeCat.Tech</title>
    <style>
        :root {
            --mocha: #8d6e63;
            --cocoa: #5d4037;
            --cream: rgba(253, 250, 249, 0.4);
            --sand: #d7ccc8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            background: linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)), 
                        url('cat-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--cocoa);
        }

        /* --- HEADER & SEARCH WRAPPER --- */
        .search-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .logo {
            font-size: 5rem;
            font-weight: 800;
            color: var(--cocoa);
            margin-bottom: 30px;
            cursor: pointer;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
        }

        .logo span { color: var(--mocha); }

        .search-container {
            width: 100%;
            max-width: 584px;
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 100px 14px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.5);
            outline: none;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            transition: box-shadow 0.2s, background 0.3s;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 1px 12px rgba(0,0,0,0.2);
        }

        .search-btn {
            position: absolute;
            right: 15px;
            background: var(--mocha);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 600;
        }

        /* --- STICKY SEARCH STATE --- */
        body.searching .search-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            flex-grow: 0;
            flex-direction: row;
            justify-content: flex-start;
            padding: 15px 5%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        body.searching .logo {
            font-size: 1.8rem;
            margin-bottom: 0;
            margin-right: 40px;
        }

        /* --- RESULTS SECTION --- */
        #results-section {
            display: none;
            padding: 120px 5% 100px 5%;
            max-width: 1000px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .result-item {
            margin-bottom: 30px;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .result-item a {
            font-size: 1.25rem;
            color: #1a0dab;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .result-item a:hover { text-decoration: underline; }

        /* --- MODAL / IFRAME OVERLAY --- */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #modal-content {
            width: 95%;
            height: 90%;
            background: white;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        #modal-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #close-modal {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #333;
            font-weight: bold;
            background: #eee;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        footer {
            background: rgba(242, 242, 242, 0.3);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            margin-top: auto;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            .search-wrapper {
                padding: 10px;
            }

            .logo {
                font-size: 3rem;
                margin-bottom: 20px;
            }

            input[type="text"] {
                padding: 12px 80px 12px 20px;
                font-size: 14px;
            }

            .search-btn {
                padding: 6px 12px;
                font-size: 14px;
            }

            #results-section {
                padding: 80px 10px 50px 10px;
            }

            .result-item {
                padding: 15px;
                margin-bottom: 20px;
            }

            .result-item a {
                font-size: 1.1rem;
            }

            #modal-content {
                width: 98%;
                height: 95%;
            }

            footer {
                padding: 10px 15px;
            }

            .footer-content {
                flex-direction: column;
                gap: 15px !important;
            }

            .footer-content a {
                display: block;
                padding: 5px 0;
            }

            div[style*="position: fixed; top: 20px; left: 20px"] {
                top: 10px;
                left: 10px;
                font-size: 1.2rem;
            }
        }

        @media (min-width: 1024px) {
            .search-wrapper {
                padding: 30px;
            }

            .logo {
                font-size: 6rem;
                margin-bottom: 40px;
            }

            .search-container {
                max-width: 700px;
            }

            input[type="text"] {
                padding: 16px 110px 16px 30px;
                font-size: 18px;
            }

            .search-btn {
                padding: 10px 20px;
                font-size: 16px;
            }

            #results-section {
                padding: 150px 10% 100px 10%;
                max-width: 1200px;
            }

            .result-item {
                padding: 25px;
                max-width: 700px;
            }

            footer {
                padding: 20px 40px;
            }

            .footer-content {
                gap: 40px !important;
            }

            div[style*="position: fixed; top: 20px; left: 20px"] {
                top: 30px;
                left: 30px;
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
   
    <div style="position: fixed; top: 20px; left: 20px; font-size: 1.5rem; font-weight: 800; color: var(--cocoa); z-index: 999; cursor: pointer;" onclick="location.reload()">
        🐱 BeCat<span style="color: var(--mocha);">.Tech</span>
    </div>

    <div class="search-wrapper" id="headerWrapper">
        <div class="logo" id="mainLogo" onclick="location.reload()">BeCat<span>.Tech</span></div>
        <div class="search-container">
            <input type="text" id="searchInput" autocomplete="off" placeholder="Search with a purr...">
            <button class="search-btn" onclick="handleSearch()">Search</button>
        </div>
    </div>

    <main id="results-section">
        <div id="results-list"></div>
    </main>

    <div id="modal-overlay" onclick="closeModal()">
        <div id="modal-content" onclick="event.stopPropagation()">
            <span id="close-modal" onclick="closeModal()">&times;</span>
            <iframe id="modal-iframe" src=""></iframe>
        </div>
    </div>

    <footer>
        <div class="footer-content" style="display: flex; justify-content: center; gap: 25px;">
            <a href="https://shahed.gt.tc/" target="_blank" style="color: var(--cocoa); text-decoration: none;">Shahed</a>
            <a href="privacy.html" style="color: var(--cocoa); text-decoration: none;">Privacy</a>
            <a href="terms.html" style="color: var(--cocoa); text-decoration: none;">Terms</a>
            <a href="business.html" style="color: var(--cocoa); text-decoration: none;">Business</a>
            <a href="prodects.html" style="color: var(--cocoa); text-decoration: none;">Products</a>
        </div>
    </footer>

    <script>
        async function handleSearch() {
            const query = document.getElementById('searchInput').value;
            const resultsSection = document.getElementById('results-section');
            const resultsList = document.getElementById('results-list');

            if (!query) return;

            document.body.classList.add('searching');
            resultsSection.style.display = "block";
            resultsList.innerHTML = "<p style='color:white;'>BeCat is hunting...</p>";

            try {
                const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json`);
                const data = await response.json();
                resultsList.innerHTML = "";

                if (data.AbstractURL) addResult(data.Heading || "Main Result", data.AbstractURL, data.AbstractText);
                
                if (data.RelatedTopics) {
                    data.RelatedTopics.slice(0, 8).forEach(item => {
                        if (item.FirstURL) addResult(item.Text.split(' - ')[0], item.FirstURL, item.Text);
                    });
                }
            } catch (e) {
                resultsList.innerHTML = "<p style='color:white;'>Search error.</p>";
            }
        }

        // --- THIS IS THE KEY PART YOU ASKED ABOUT ---
        function addResult(title, url, snippet) {
            const resultsList = document.getElementById('results-list');
            const div = document.createElement('div');
            div.className = 'result-item';

            // Check if the URL is from a site that forbids iframes
            const blocksIframe = url.includes('wikipedia.org') || 

            div.innerHTML = `
                <cite style="display:block; font-size:12px; color:var(--mocha)">${url}</cite>
                ${blocksIframe 
                    ? `<a href="${url}" target="_blank">${title} ↗</a>` // Opens in new tab
                    : `<a onclick="openModal('${url}')">${title}</a>`   // Opens in modal
                }
                <p style="font-size:14px; margin-top:5px;">${snippet}</p>
            `;
            resultsList.appendChild(div);
        }

        function openModal(url) {
            document.getElementById('modal-iframe').src = url;
            document.getElementById('modal-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('modal-iframe').src = '';
            document.body.style.overflow = 'auto';
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });
    </script>

</body>
</html>
