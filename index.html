<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="icon.png">
    <title>BeCat.Tech</title>
    <style>
        :root {
            --mocha: #8d6e63;
            --cocoa: #5d4037;
            --cream: rgba(253, 250, 249, 0.6);
            --glass: rgba(255, 255, 255, 0.75);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            background: linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)), 
                        url('cat-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--cocoa);
            overflow-x: hidden;
        }

        /* --- LOGO & SEARCH --- */
        .search-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding: 20px;
            transition: all 0.4s ease-in-out;
            z-index: 1000;
        }

        .logo {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 800;
            color: var(--cocoa);
            margin-bottom: 30px;
            cursor: pointer;
            text-align: center;
        }

        .logo span { color: var(--mocha); }

        .search-container {
            width: 100%;
            max-width: 600px;
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 100px 15px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.4);
            outline: none;
            font-size: 16px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .search-btn {
            position: absolute;
            right: 10px;
            background: var(--mocha);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }

        /* --- ACTIVE SEARCH STATE --- */
        body.searching .search-wrapper {
            position: fixed;
            top: 0;
            width: 100%;
            flex-direction: row;
            justify-content: space-between;
            padding: 15px 5%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        body.searching .logo {
            font-size: 1.5rem;
            margin-bottom: 0;
        }

        /* --- RESULTS --- */
        #results-section {
            display: none;
            padding: 120px 5% 50px 5%;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .result-item {
            margin-bottom: 20px;
            background: var(--glass);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .result-item a {
            font-size: 1.3rem;
            color: #1a0dab;
            text-decoration: none;
            font-weight: 600;
        }

        /* --- MODAL (The Glass Frame) --- */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4); /* Dim the background slightly */
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px); /* Blur the cat slightly */
        }

        #modal-content {
            width: 85%;  /* Gap on left/right */
            height: 80%; /* Gap on top/bottom */
            background: rgba(255, 255, 255, 0.7); /* Semi-transparent white */
            border-radius: 25px; /* Rounded corners */
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            flex-direction: column;
        }

        #modal-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        #close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            z-index: 2100;
            color: #000;
            background: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        footer {
            padding: 20px;
            background: rgba(255,255,255,0.1);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        footer a { color: var(--cocoa); text-decoration: none; margin: 0 10px; font-size: 14px; }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 768px) {
            #modal-content {
                width: 92%;
                height: 85%;
            }
            body.searching .logo { display: none; }
            body.searching .search-wrapper { justify-content: center; }
            #results-section { padding-top: 100px; }
        }
    </style>
</head>
<body>

    <div style="position: fixed; top: 20px; left: 20px; font-weight: 800; color: var(--cocoa); z-index: 999; cursor: pointer;" onclick="location.reload()">
        🐱 BeCat.Tech
    </div>

    <div class="search-wrapper">
        <div class="logo" onclick="location.reload()">BeCat<span>.Tech</span></div>
        <div class="search-container">
            <input type="text" id="searchInput" autocomplete="off" placeholder="Search the web...">
            <button class="search-btn" onclick="handleSearch()">Search</button>
        </div>
    </div>

    <main id="results-section">
        <div id="results-list"></div>
    </main>

    <div id="modal-overlay" onclick="closeModal()">
        <div id="modal-content" onclick="event.stopPropagation()">
            <span id="close-modal" onclick="closeModal()">&times;</span>
            <iframe id="modal-iframe" src=""></iframe>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#">Shahed</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Products</a>
        </div>
    </footer>

    <script>
        async function handleSearch() {
            const query = document.getElementById('searchInput').value;
            const resultsSection = document.getElementById('results-section');
            const resultsList = document.getElementById('results-list');

            if (!query) return;

            document.body.classList.add('searching');
            resultsSection.style.display = "block";
            resultsList.innerHTML = "<p style='text-align:center;'>Searching...</p>";

            // Fetching from Wikipedia API
            const apiEndpoint = `https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(query)}&limit=10&namespace=0&format=json&origin=*`;

            try {
                const response = await fetch(apiEndpoint);
                const data = await response.json();
                resultsList.innerHTML = "";

                if (data[1].length === 0) {
                    resultsList.innerHTML = "<p>No results found.</p>";
                    return;
                }

                for (let i = 0; i < data[1].length; i++) {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `
                        <cite style="display:block; font-size:11px; color:var(--mocha); margin-bottom:5px;">${data[3][i]}</cite>
                        <a href="javascript:void(0)" onclick="openModal('${data[3][i]}')">${data[1][i]}</a>
                        <p style="font-size:14px; margin-top:5px; color:#444;">${data[2][i] || 'Click to view article...'}</p>
                    `;
                    resultsList.appendChild(div);
                }
                window.scrollTo(0,0);
            } catch (e) {
                resultsList.innerHTML = "<p>Search error.</p>";
            }
        }

        function openModal(url) {
            const modal = document.getElementById('modal-overlay');
            const iframe = document.getElementById('modal-iframe');
            iframe.src = url;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('modal-iframe').src = '';
            document.body.style.overflow = 'auto';
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });
    </script>
</body>
</html>
