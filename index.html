<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="icon.png">
    <title>BeCat.Tech</title>
    <style>
        :root {
            --mocha: #8d6e63;
            --cocoa: #5d4037;
            --cream: rgba(253, 250, 249, 0.4);
            --sand: #d7ccc8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            background: linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)), 
                        url('cat-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--cocoa);
        }

        /* --- HEADER & SEARCH --- */
        .search-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .logo {
            font-size: 5rem;
            font-weight: 800;
            color: var(--cocoa);
            margin-bottom: 30px;
            cursor: pointer;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .logo span { color: var(--mocha); }

        .search-container {
            width: 100%;
            max-width: 584px;
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 90px 14px 20px; /* Adjusted padding */
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.5);
            outline: none;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
        }

        .search-btn {
            position: absolute;
            right: 10px;
            background: var(--mocha);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 600;
        }

        /* --- SEARCHING STATE --- */
        body.searching .search-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            flex-grow: 0;
            flex-direction: row;
            justify-content: center;
            padding: 15px 5%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        body.searching .logo {
            font-size: 1.8rem;
            margin-bottom: 0;
            margin-right: 20px;
        }

        /* --- RESULTS --- */
        #results-section {
            display: none;
            padding: 100px 5% 50px 5%;
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .result-item {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.85);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .result-item a {
            font-size: 1.15rem;
            color: #1a0dab;
            text-decoration: none;
            font-weight: 500;
        }

        /* --- MODAL --- */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        #modal-content {
            width: 95%;
            height: 90%;
            background: white;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        #modal-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #close-modal {
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 35px;
            cursor: pointer;
            z-index: 2100;
            color: #333;
        }

        footer {
            background: rgba(242, 242, 242, 0.3);
            padding: 15px;
            margin-top: auto;
            text-align: center;
        }

        footer a {
            color: var(--cocoa);
            text-decoration: none;
            margin: 0 10px;
            font-size: 14px;
        }

        /* --- MOBILE RESPONSIVE QUERIES --- */
        @media (max-width: 600px) {
            .logo {
                font-size: 3rem;
            }

            body.searching .logo {
                display: none; /* Hide logo on mobile search to save space */
            }

            body.searching .search-wrapper {
                padding: 10px;
            }

            .search-container {
                max-width: 100%;
            }

            #results-section {
                padding-top: 80px;
            }

            #modal-content {
                width: 100%;
                height: 100%;
                border-radius: 0;
            }

            footer a {
                display: inline-block;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>

    <div style="position: fixed; top: 15px; left: 15px; font-size: 1.2rem; font-weight: 800; color: var(--cocoa); z-index: 999; cursor: pointer;" onclick="location.reload()">
        🐱 BeCat<span style="color: var(--mocha);">.Tech</span>
    </div>

    <div class="search-wrapper" id="headerWrapper">
        <div class="logo" id="mainLogo" onclick="location.reload()">BeCat<span>.Tech</span></div>
        <div class="search-container">
            <input type="text" id="searchInput" autocomplete="off" placeholder="Wikipedia Search...">
            <button class="search-btn" onclick="handleSearch()">Go</button>
        </div>
    </div>

    <main id="results-section">
        <div id="results-list"></div>
    </main>

    <div id="modal-overlay" onclick="closeModal()">
        <div id="modal-content" onclick="event.stopPropagation()">
            <span id="close-modal" onclick="closeModal()">&times;</span>
            <iframe id="modal-iframe" src=""></iframe>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="https://shahed.gt.tc/">Shahed</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="business.html">Business</a>
            <a href="prodects.html">Products</a>
        </div>
    </footer>

    <script>
        async function handleSearch() {
            const query = document.getElementById('searchInput').value;
            const resultsSection = document.getElementById('results-section');
            const resultsList = document.getElementById('results-list');

            if (!query) return;

            document.body.classList.add('searching');
            resultsSection.style.display = "block";
            resultsList.innerHTML = "<p style='text-align:center;'>Searching Wikipedia...</p>";

            const apiEndpoint = `https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(query)}&limit=12&namespace=0&format=json&origin=*`;

            try {
                const response = await fetch(apiEndpoint);
                const data = await response.json();
                
                const titles = data[1];
                const snippets = data[2];
                const links = data[3];

                resultsList.innerHTML = "";

                if (titles.length === 0) {
                    resultsList.innerHTML = "<p style='text-align:center;'>No results found.</p>";
                    return;
                }

                for (let i = 0; i < titles.length; i++) {
                    addResult(titles[i], links[i], snippets[i]);
                }

                window.scrollTo(0, 0);
            } catch (e) {
                resultsList.innerHTML = "<p>Error reaching Wikipedia.</p>";
            }
        }

        function addResult(title, url, snippet) {
            const resultsList = document.getElementById('results-list');
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <cite style="display:block; font-size:11px; color:var(--mocha); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${url}</cite>
                <a href="javascript:void(0)" onclick="openModal('${url}')">${title}</a>
                <p style="font-size:14px; margin-top:5px; color:#555;">${snippet || 'Read more on Wikipedia...'}</p>
            `;
            resultsList.appendChild(div);
        }

        function openModal(url) {
            const modal = document.getElementById('modal-overlay');
            const iframe = document.getElementById('modal-iframe');
            iframe.src = url;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('modal-iframe').src = '';
            document.body.style.overflow = 'auto';
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        document.querySelectorAll('footer a').forEach(link => {
            link.addEventListener('click', function(e) {
                const url = this.getAttribute('href');
                if (url && url !== '#' && !url.startsWith('javascript')) {
                    e.preventDefault();
                    openModal(url);
                }
            });
        });
    </script>
</body>
</html>
