<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="icon.png">
    <title>Business - BeCat.Tech</title>
    <style>
        :root {
            --mocha: #8d6e63;
            --cocoa: #5d4037;
            --cream: rgba(253, 250, 249, 0.4);
            --sand: #d7ccc8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            background: linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)), 
                        url('cat-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: var(--cocoa);
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--cocoa);
            cursor: pointer;
            text-decoration: none;
        }

        .header-logo span { color: var(--mocha); }

        .back-btn {
            background: var(--mocha);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .back-btn:hover { opacity: 0.8; }

        main {
            flex: 1;
            padding: 60px 30px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: var(--cocoa);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 15px;
            color: var(--cocoa);
        }

        strong {
            color: var(--mocha);
        }

        .contact-info a {
            color: var(--mocha);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .contact-info a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .content-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .contact-info {
            margin-top: 20px;
        }

        footer {
            background: rgba(242, 242, 242, 0.3);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-top: 1px solid rgba(0,0,0,0.1);
            text-align: center;
            margin-top: auto;
        }

        footer a {
            color: var(--cocoa);
            text-decoration: none;
            margin: 0 15px;
        }

        footer a:hover { text-decoration: underline; }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .header-logo {
                font-size: 1.2rem;
            }

            .back-btn {
                padding: 8px 16px;
                font-size: 14px;
            }

            main {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }

            .content-box {
                padding: 25px;
            }

            footer {
                padding: 15px 20px;
            }

            footer a {
                display: block;
                margin: 10px 0;
            }
        }

        @media (min-width: 1024px) {
            header {
                padding: 25px 40px;
            }

            .header-logo {
                font-size: 1.8rem;
            }

            .back-btn {
                padding: 12px 24px;
            }

            main {
                padding: 80px 40px;
                max-width: 1000px;
            }

            h1 {
                font-size: 3rem;
            }

            p {
                font-size: 1.2rem;
            }

            .content-box {
                padding: 50px;
            }

            footer {
                padding: 25px 40px;
            }

            footer a {
                margin: 0 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="header-logo">🐱 BeCat<span>.Tech</span></a>
        <a href="index.html" class="back-btn">← Back</a>
    </header>

    <main>
        <div class="content-box">
            <h1>Business</h1>
            <p>For business inquiries, partnerships, or collaborations, please reach out:</p>
            <div class="contact-info">
                <p><strong>Email:</strong> <a href="mailto:shahed0zero@gmail.com">shahed0zero@gmail.com</a></p>
            </div>
        </div>
    </main>

    <footer>
        <a href="privacy.html">Privacy</a>
        <a href="terms.html">Terms</a>
        <a href="prodects.html">Products</a>
        <a href="https://shahed.gt.tc/" target="_blank">Shahed</a>
    </footer>
</body>
</html>
